name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Pre-check
        run: |
          set -e
          echo "=== File info ==="
          ls -la gradlew gradle/wrapper/gradle-wrapper.jar
          file gradlew gradle/wrapper/gradle-wrapper.jar
          java -version 2>&1
          echo "=== gradlew content (first 10 lines) ==="
          head -10 gradlew

      - name: Build debug APK
        run: |
          set -e
          bash gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
        continue-on-error: true

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: failure() || success()
        with:
          name: build-log
          path: build.log
          retention-days: 1

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: FakeGps-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
