name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install CMake
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "cmake;3.18.1" 2>&1 | tail -3

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Pre-check CMake
        run: ls $ANDROID_HOME/cmake/ 2>/dev/null || echo "cmake dir empty"

      - name: Build debug APK
        run: bash gradlew assembleDebug --no-daemon 2>&1 | tee build.log
        continue-on-error: true

      - name: Upload build log
        if: failure() || success()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 1

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: FakeGps-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
